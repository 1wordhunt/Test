<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Süper Futbol Mobil</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #2e7d32; touch-action: none; font-family: sans-serif; }
        
        /* Saha Çizgisi */
        #saha { width: 100vw; height: 100vh; position: relative; border: 5px solid rgba(255,255,255,0.3); box-sizing: border-box; }

        /* Mavi Oyuncu */
        #oyuncu { 
            width: 60px; height: 60px; background: #3498db; 
            border-radius: 50%; position: absolute; border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10;
        }

        /* Beyaz Top */
        #top { 
            width: 30px; height: 30px; background: white; 
            border-radius: 50%; position: absolute; border: 2px solid black;
            z-index: 5; transition: top 0.1s linear, left 0.1s linear;
        }

        /* Şut Butonu */
        #sutBtn { 
            position: absolute; bottom: 40px; right: 40px; 
            width: 100px; height: 100px; border-radius: 50%; 
            background: #e74c3c; color: white; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            border: 4px solid white; font-size: 20px; z-index: 100;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

<div id="saha">
    <div id="oyuncu" style="left: 150px; top: 300px;"></div>
    <div id="top" style="left: 200px; top: 150px;"></div>
    <div id="sutBtn">ŞUT</div>
</div>

<script>
    const oyuncu = document.getElementById('oyuncu');
    const top = document.getElementById('top');
    const sutBtn = document.getElementById('sutBtn');

    let pX = 150, pY = 400; // Oyuncu pozisyon
    let bX = 200, bY = 200; // Top pozisyon
    let bende = false;

    // Mobil Hareket Kontrolü
    window.addEventListener('touchmove', (e) => {
        e.preventDefault();
        pX = e.touches[0].clientX - 30; // Merkeze al
        pY = e.touches[0].clientY - 30;
        oyuncu.style.left = pX + 'px';
        oyuncu.style.top = pY + 'px';
        
        kontrolEt();
    }, { passive: false });

    // Çarpışma ve Yapışma Kontrolü
    function kontrolEt() {
        let dx = (pX + 30) - (bX + 15);
        let dy = (pY + 30) - (bY + 15);
        let mesafe = Math.sqrt(dx*dx + dy*dy);

        if (mesafe < 45) { // Değdiyse yapıştır
            bende = true;
        }

        if (bende) {
            bX = pX + 15;
            bY = pY - 40; // Topu oyuncunun üstünde tut
            top.style.left = bX + 'px';
            top.style.top = bY + 'px';
        }
    }

    // Şut Atma
    sutBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (bende) {
            bende = false;
            // Topu ileri (yukarı) fırlat
            bY -= 200; 
            top.style.top = bY + 'px';
            
            // 1 saniye sonra topu durdur (basit simülasyon)
            setTimeout(() => {
                if (bY < 0) bY = 50; // Ekrandan çıkarsa geri gelsin
                top.style.top = bY + 'px';
            }, 300);
        }
    });
</script>

</body>
</html>
