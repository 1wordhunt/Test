<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelime Projesi v3.2</title>
    <style>
        :root {
            --spot-red: #ff5e5e; /* Attığın görseldeki kırmızı tonu */
            --spot-bg: #121212;
        }

        body { font-family: 'Segoe UI', sans-serif; background: #f0f0f0; margin: 0; padding: 20px; }
        
        /* Kelime Listesi */
        .list-container { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
        .word-item { 
            background: white; padding: 20px; border-radius: 12px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); font-weight: bold;
        }

        /* Spotify Modal Tasarımı */
        #page-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;
            backdrop-filter: blur(8px);
        }

        .spotify-card { 
            background: var(--spot-red); 
            width: 90%; max-width: 400px; 
            border-radius: 40px; 
            padding: 30px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            /* Görseldeki o çapraz çizgili desen */
            background-image: 
                linear-gradient(45deg, rgba(255,255,255,0.1) 25%, transparent 25%), 
                linear-gradient(-45deg, rgba(255,255,255,0.1) 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.1) 75%), 
                linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.1) 75%);
            background-size: 40px 40px;
            transform: scale(0.1); opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #page-overlay.active { display: flex; }
        #page-overlay.active .spotify-card { transform: scale(1); opacity: 1; }

        /* İçerik Kutusu (Beyaz Alan) */
        .inner-content { 
            background: white; border-radius: 30px; padding: 20px; 
            margin-bottom: 25px; min-height: 300px;
        }

        #selectedWordTitle { font-size: 42px; margin: 10px 0; color: #333; font-weight: 900; }

        .media-grid { display: flex; gap: 10px; margin-top: 20px; }
        .media-box { flex: 1; height: 150px; background: #eee; border-radius: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #999; border: 1px solid #ddd; }

        /* Spotify Player Kontrolleri */
        .player-controls-container { width: 100%; color: black; position: relative; }
        
        .progress-bar-area { width: 100%; height: 3px; background: rgba(0,0,0,0.2); border-radius: 2px; margin: 20px 0; position: relative; }
        .progress-fill { width: 40%; height: 100%; background: black; border-radius: 2px; }
        .progress-knob { width: 10px; height: 10px; background: black; border-radius: 50%; position: absolute; left: 40%; top: -4px; }

        .main-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .control-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: black; padding: 0; }
        .play-pause-btn { background: black; color: var(--spot-red); width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; }
        
        .add-btn { position: absolute; right: 0; top: -45px; font-size: 28px; font-weight: normal; cursor: pointer; }

        .back-x { position: absolute; top: 15px; left: 25px; font-size: 24px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1 style="text-align: center;">Kelime Listesi</h1>
    <div class="list-container" id="list"></div>

    <div id="page-overlay">
        <div class="spotify-card">
            <div class="back-x" onclick="closePage()">✕</div>
            
            <div class="inner-content">
                <h1 id="selectedWordTitle">Kelime</h1>
                <div class="media-grid">
                    <div class="media-box" id="imageBox">Resim</div>
                    <div class="media-box" id="filmBox">Film Kesiti</div>
                </div>
            </div>

            <div class="player-controls-container">
                <div class="add-btn">⊕</div>
                
                <div class="progress-bar-area">
                    <div class="progress-fill"></div>
                    <div class="progress-dot"></div>
                    <div class="progress-knob"></div>
                </div>

                <div class="main-controls">
                    <button class="control-btn" style="font-size: 18px;">🔀</button>
                    <button class="control-btn">⏮</button>
                    <button class="play-pause-btn" onclick="speakAgain()">▶</button>
                    <button class="control-btn">⏭</button>
                    <button class="control-btn" style="font-size: 18px;">🔁</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentWord = "";

        const wordData = [
            {en:"time", img:"https://i.ibb.co/FbnR47rF/MG-20260310-WA0034.jpg"},
            {en:"year", img:"https://i.ibb.co/Pz3tWTSw/MG-20260310-WA0035.jpg"},
            {en:"people", img:"https://i.ibb.co/8g9cT4GM/MG-20260310-WA0036.jpg"},
            {en:"way", img:"https://i.ibb.co/chCL2m8m/MG-20260310-WA0037.jpg"},
            {en:"man", img:"https://i.ibb.co/xtmpJsr7/MG-20260310-WA0039.jpg"}
            // ... Diğer kelimeleri buraya ekleyebilirsin
        ];

        const listDiv = document.getElementById('list');
        wordData.forEach((item, index) => {
            let div = document.createElement('div');
            div.className = 'word-item';
            div.innerHTML = `<span>${index + 1}. ${item.en}</span> <span>🔊</span>`;
            div.onclick = () => openPage(item);
            listDiv.appendChild(div);
        });

        function openPage(item) {
            currentWord = item.en;
            document.getElementById('selectedWordTitle').innerText = item.en;
            document.getElementById('page-overlay').classList.add('active');
            
            // Resim Alanı
            const imgBox = document.getElementById('imageBox');
            imgBox.innerHTML = item.img ? `<img src="${item.img}" style="width:100%;height:100%;object-fit:cover;">` : "Resim Yok";
            
            speak(item.en);
        }

        function closePage() {
            document.getElementById('page-overlay').classList.remove('active');
            window.speechSynthesis.cancel();
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
        }

        function speakAgain() {
            if(currentWord) speak(currentWord);
        }
    </script>
</body>
</html>
