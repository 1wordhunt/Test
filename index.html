<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelime Projesi v3.8</title>
    <style>
        :root {
            --spot-black: #121212;
            --spot-grey: #181818;
            --inner-grey: #282828;
            --spot-green: #1DB954;
        }

        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        
        /* Liste Tasarımı */
        .list-container { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
        .word-item { 
            background: white; padding: 18px; border-radius: 15px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.2s;
        }
        .word-item:active { transform: scale(0.98); }
        .word-text { font-size: 17px; font-weight: 600; flex-grow: 1; }
        .word-tr { font-size: 14px; color: #888; margin-left: 8px; font-weight: 400; }
        .listen-icon { font-size: 20px; color: var(--spot-green); padding: 5px; cursor: pointer; }

        /* Overlay */
        #page-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--spot-black); z-index: 1000; justify-content: center; align-items: center;
            flex-direction: column;
        }

        .content-container { width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }

        /* Üst Bilgi */
        .word-header { color: white; text-align: center; margin-bottom: 10px; }
        .word-header h1 { margin: 0; font-size: 32px; font-weight: 800; display: inline-block; vertical-align: middle; }
        .word-header span { font-size: 18px; opacity: 0.6; margin-left: 10px; }
        .header-listen { background: none; border: none; color: white; font-size: 24px; cursor: pointer; margin-left: 10px; vertical-align: middle; }

        .media-row { display: flex; gap: 10px; width: 100%; }
        .media-box { 
            flex: 1; height: 150px; background: #333; border-radius: 20px; 
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .media-box img { width: 100%; height: 100%; object-fit: cover; }

        /* Player Kartı */
        .spotify-card { 
            background: var(--spot-grey); border-radius: 35px; padding: 30px; 
            color: white; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .empty-player-box { height: 180px; background: var(--inner-grey); border-radius: 20px; margin-bottom: 25px; }

        .progress-area { width: 100%; position: relative; margin: 25px 0 15px 0; }
        .bar-bg { width: 100%; height: 4px; background: #4f4f4f; border-radius: 2px; }
        .bar-fill { width: 55%; height: 4px; background: white; border-radius: 2px; }
        .dot { width: 12px; height: 12px; background: white; border-radius: 50%; position: absolute; left: 55%; top: -4px; }
        .plus-icon { position: absolute; right: 0; top: -35px; font-size: 24px; }

        .btns { display: flex; justify-content: space-between; align-items: center; }
        .btn-small { background: none; border: none; font-size: 22px; color: #b3b3b3; cursor: pointer; }
        .play-main { background: white; color: black; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; border: none; cursor: pointer; }

        .close-x { position: absolute; top: 20px; right: 20px; font-size: 26px; color: #b3b3b3; cursor: pointer; z-index: 1001; }
    </style>
</head>
<body>

    <h1 style="text-align:center">İngilizce 100 Kelime</h1>
    <div class="list-container" id="list"></div>

    <div id="page-overlay">
        <div class="close-x" onclick="closePage()">✕</div>
        <div class="content-container">
            <div class="word-header">
                <h1 id="topWord">WORD</h1>
                <span id="topTr">(Türkçe)</span>
                <button class="header-listen" onclick="speakAgain()">🔊</button>
            </div>
            <div class="media-row">
                <div class="media-box" id="resimKutusu"></div>
                <div class="media-box" id="filmKutusu"></div>
            </div>
            <div class="spotify-card">
                <div class="empty-player-box"></div>
                <div class="progress-area">
                    <div class="plus-icon">⊕</div>
                    <div class="bar-bg"><div class="bar-fill"></div></div>
                    <div class="dot"></div>
                </div>
                <div class="btns">
                    <button class="btn-small">🔀</button>
                    <button class="btn-small">⏮</button>
                    <button class="play-main" onclick="speakAgain()">▶</button>
                    <button class="btn-small">⏭</button>
                    <button class="btn-small">🔁</button>
                </div>
            </div>
        </div>
    </div>

            {en:"dream", tr:"rüya", img:""}, {en:"book", tr:"kitap", img:""},
            {en:"water", tr:"su", img:""}, {en:"idea", tr:"fikir", img:""},

            {en:"night", tr:"gece", img:""}, {en:"home", tr:"ev", img:""},
            {en:"story", tr:"hikaye", img:""}, {en:"month", tr:"ay", img:""},
            {en:"paper", tr:"kağıt", img:""}, {en:"game", tr:"oyun", img:""},
            {en:"heart", tr:"kalp", img:""}, {en:"sun", tr:"güneş", img:""}
        ];

        const listDiv = document.getElementById('list');
        wordData.forEach((item, index) => {
            let div = document.createElement('div');
            div.className = 'word-item';
            div.innerHTML = `
                <div class="word-text" onclick='openPage(${JSON.stringify(item)})'>
                    <b>${index + 1}.</b> ${item.en} <span class="word-tr">${item.tr}</span>
                </div>
                <span class="listen-icon" onclick="event.stopPropagation(); speak('${item.en}')">🔊</span>
            `;
            listDiv.appendChild(div);
        });

        function openPage(item) {
            currentWord = item.en;
            document.getElementById('topWord').innerText = item.en.toUpperCase();
            document.getElementById('topTr').innerText = `(${item.tr})`;
            
            const imgUrl = item.img ? item.img : "https://via.placeholder.com/150?text=No+Image";
            document.getElementById('resimKutusu').innerHTML = `<img src="${imgUrl}">`;
            document.getElementById('filmKutusu').innerHTML = `<p style="font-size:12px;color:#999">Hoca film atcak</p>`;
            
            document.getElementById('page-overlay').style.display = 'flex';
            speak(item.en);
        }

        function closePage() {
            document.getElementById('page-overlay').style.display = 'none';
            window.speechSynthesis.cancel();
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
        }

        function speakAgain() { if(currentWord) speak(currentWord); }
    </script>
</body>
</html>
