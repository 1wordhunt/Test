<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Subway Run | Burak Developer Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: 'Courier New', monospace; }
        #ui { 
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #0ff; font-size: 32px; font-weight: bold;
            pointer-events: none; text-shadow: 0 0 20px #0ff;
        }
        #instructions {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            color: #fff; font-size: 14px; opacity: 0.8; pointer-events: none;
            text-transform: uppercase; letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div id="ui">SCORE: <span id="score">0</span></div>
    <div id="instructions">TAP SIDES TO MOVE | CENTER TO JUMP</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- SAHNE VE SİS ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        scene.fog = new THREE.FogExp2(0x020205, 0.05);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 9); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- IŞIKLANDIRMA ---
        const ambient = new THREE.AmbientLight(0x404040, 1.5);
        scene.add(ambient);
        const playerLight = new THREE.PointLight(0x00ff88, 2, 15);
        scene.add(playerLight);

        // --- YOL VE RAYLAR ---
        const roadGroup = new THREE.Group();
        scene.add(roadGroup);

        const roadGeo = new THREE.PlaneGeometry(12, 1000);
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x151515 });
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.rotation.x = -Math.PI / 2;
        roadGroup.add(road);

        // Ray Çizgileri
        [-3.5, 0, 3.5].forEach(x => {
            const lineGeo = new THREE.PlaneGeometry(0.2, 1000);
            const lineMat = new THREE.MeshBasicMaterial({ color: 0x333333 });
            const line = new THREE.Mesh(lineGeo, lineMat);
            line.rotation.x = -Math.PI / 2;
            line.position.set(x, 0.01, 0);
            roadGroup.add(line);
        });

        // --- OYUNCU ---
        const playerGeo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
        const playerMat = new THREE.MeshPhongMaterial({ color: 0x00ff88, emissive: 0x00ff88, emissiveIntensity: 0.5 });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.position.y = 0.6;
        scene.add(player);

        // --- DEĞİŞKENLER ---
        let currentLane = 0;
        const laneWidth = 3.5;
        let score = 0;
        let gameSpeed = 0.4;
        let isJumping = false;
        let jumpVelocity = 0;
        const obstacles = [];
        const envObjects = [];

        // --- SAĞLAM HARİTA ÖĞELERİ (Binalar ve Lambalar) ---
        function createEnv(z) {
            // Binalar
            const h = Math.random() * 20 + 10;
            const bGeo = new THREE.BoxGeometry(4, h, 4);
            const bMat = new THREE.MeshStandardMaterial({ color: 0x050505, emissive: 0x111111 });
            
            const leftB = new THREE.Mesh(bGeo, bMat);
            leftB.position.set(-10, h/2, z);
            scene.add(leftB);
            envObjects.push(leftB);

            const rightB = new THREE.Mesh(bGeo, bMat);
            rightB.position.set(10, h/2, z);
            scene.add(rightB);
            envObjects.push(rightB);

            // Sokak Lambası (Neon Direkler)
            const pGeo = new THREE.CylinderGeometry(0.1, 0.1, 6);
            const pMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
            const pole = new THREE.Mesh(pGeo, pMat);
            pole.position.set(6, 3, z);
            scene.add(pole);
            envObjects.push(pole);
        }

        for(let i=0; i<40; i++) createEnv(-i * 15);

        // --- KONTROLLER ---
        const move = (dir) => {
            if(dir === 'L' && currentLane > -1) currentLane--;
            if(dir === 'R' && currentLane < 1) currentLane++;
            if(dir === 'J' && !isJumping) { isJumping = true; jumpVelocity = 0.25; }
        };

        window.addEventListener('touchstart', (e) => {
            const x = e.touches[0].clientX;
            const w = window.innerWidth;
            if (x < w/3) move('L');
            else if (x > w*2/3) move('R');
            else move('J');
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') move('L');
            if (e.code === 'ArrowRight' || e.code === 'KeyD') move('R');
            if (e.code === 'Space' || e.code === 'ArrowUp') move('J');
        });

        // --- ENGEL SPAWN ---
        function spawn() {
            const type = Math.random();
            const h = type > 0.8 ? 2.5 : 1.2;
            const oGeo = new THREE.BoxGeometry(1.6, h, 1.6);
            const oMat = new THREE.MeshPhongMaterial({ color: 0xff0055, emissive: 0xff0055, emissiveIntensity: 0.6 });
            const obs = new THREE.Mesh(oGeo, oMat);
            obs.position.set((Math.floor(Math.random()*3)-1)*laneWidth, h/2, -80);
            scene.add(obs);
            obstacles.push(obs);
        }
        setInterval(spawn, 700);

        // --- ANİMASYON DÖNGÜSÜ ---
        function animate() {
            requestAnimationFrame(animate);

            player.position.x += (currentLane * laneWidth - player.position.x) * 0.18;
            playerLight.position.set(player.position.x, 3, player.position.z);

            if (isJumping) {
                player.position.y += jumpVelocity;
                jumpVelocity -= 0.012;
                if (player.position.y <= 0.6) { player.position.y = 0.6; isJumping = false; }
            }

            obstacles.forEach((obj, i) => {
                obj.position.z += gameSpeed;
                if (obj.position.distanceTo(player.position) < 1.3) {
                    score = 0; gameSpeed = 0.4; // Çarpma
                }
                if (obj.position.z > 20) {
                    scene.remove(obj); obstacles.splice(i, 1);
                    score += 10; gameSpeed += 0.0015;
                }
            });

            envObjects.forEach(obj => {
                obj.position.z += gameSpeed;
                if(obj.position.z > 30) obj.position.z = -300;
            });

            document.getElementById('score').innerText = score;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
