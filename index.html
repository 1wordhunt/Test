<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelime Projesi v3.0</title>
    <style>
        :root {
            --spotify-green: #1db954;
            --spotify-black: #191414;
            --bg-color: #f9f9f9;
            --main-text: #333;
            --sub-text: #7f8c8d;
        }

        body { font-family: Arial, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: var(--main-text); }
        h1 { text-align: center; color: var(--main-text); margin-bottom: 30px; }

        .list-container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }
        .word-item { 
            background: white; padding: 18px; border: 1px solid #ddd; border-radius: 8px;
            cursor: pointer; font-size: 18px; display: flex; justify-content: space-between; align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }
        .word-item:hover { background: #e0f7fa; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .word-item::after { content: "›"; font-size: 26px; color: #bbb; margin-left: 10px; }

        .speaker-btn {
            background: #3498db; color: white; border: none; border-radius: 50%;
            width: 32px; height: 32px; margin-right: 15px; cursor: pointer;
            font-size: 15px; line-height: 32px; text-align: center; display: inline-block;
        }

        #page-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); z-index: 1000; overflow-y: auto;
            backdrop-filter: blur(5px);
            justify-content: center; align-items: center;
        }

        .page-content { 
            background: white; width: 90%; max-width: 450px; border-radius: 25px; 
            padding: 30px; text-align: center;
            position: relative;
            transform: scale(0.1); opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        #page-overlay.active { display: flex; }
        #page-overlay.active .page-content { transform: scale(1); opacity: 1; }

        .content-split { display: flex; gap: 15px; margin: 20px 0; width: 100%; }
        .image-placeholder, .film-kesiti-placeholder { 
            flex: 1; min-height: 180px; background: #eee; 
            border-radius: 15px; display: flex; 
            align-items: center; justify-content: center; overflow: hidden; 
            border: 1px solid #ddd;
        }

        #selectedWordTitle { font-size: 32px; margin: 15px 0 20px 0; text-transform: capitalize; font-weight: bold; color: var(--spotify-black); }
        .back-btn { 
            background: #eee; color: var(--main-text); border: none; 
            padding: 8px 15px; border-radius: 20px; cursor: pointer; 
            position: absolute; top: 15px; left: 15px; font-weight: bold;
        }

        .music-player { background: #f4f4f4; border-radius: 20px; padding: 20px; margin-top: 20px; width: 100%; }
        .progress-container { width: 100%; height: 4px; background: #ccc; border-radius: 2px; margin-bottom: 20px; position: relative; }
        .progress-bar { width: 30%; height: 100%; background: var(--spotify-green); border-radius: 2px; }
        .player-controls { display: flex; align-items: center; justify-content: center; gap: 20px; }
        .player-controls button { background: none; border: none; font-size: 20px; cursor: pointer; }
        .play-main-btn { background: var(--spotify-black) !important; color: white !important; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <h1>İngilizce Kelime Listesi v3.0</h1>
    <div class="list-container" id="list"></div>

    <div id="page-overlay">
        <div class="page-content">
            <button class="back-btn" onclick="closePage()">⬅ Geri</button>
            <h1 id="selectedWordTitle">Kelime</h1>
            
            <div class="content-split">
                <div class="image-placeholder" id="imageBox">Resim</div>
                <div class="film-kesiti-placeholder" id="filmBox">Film</div>
            </div>

            <div class="music-player">
                <div class="progress-container"><div class="progress-bar"></div></div>
                <div class="player-controls">
                    <button>🔁</button>
                    <button>◀️</button>
                    <button class="play-main-btn" onclick="speakAgain()">▶</button>
                    <button>▶️</button>
                    <button>🔀</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentWord = "";

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
        }

        function speakAgain() {
            if(currentWord) speak(currentWord);
        }

        const wordData = [
            {en:"time", tr:"zaman", img:"https://i.ibb.co/FbnR47rF/MG-20260310-WA0034.jpg"},
            {en:"year", tr:"yıl", img:"https://i.ibb.co/Pz3tWTSw/MG-20260310-WA0035.jpg"},
            {en:"people", tr:"insanlar", img:"https://i.ibb.co/8g9cT4GM/MG-20260310-WA0036.jpg"},
            {en:"way", tr:"yol/yöntem", img:"https://i.ibb.co/chCL2m8m/MG-20260310-WA0037.jpg"},
            {en:"man", tr:"adam", img:"https://i.ibb.co/xtmpJsr7/MG-20260310-WA0039.jpg"},
            {en:"woman", tr:"kadın", img:"https://i.ibb.co/PsJf2Yz3/MG-20260310-WA0041.jpg"},
            {en:"world", tr:"dünya", img:"https://i.ibb.co/SDQ0HyB7/MG-20260310-WA0044.jpg"},
            {en:"school", tr:"okul", img:"https://i.ibb.co/Gf5FYC9V/MG-20260310-WA0045.jpg"},
            {en:"family", tr:"aile", img:"https://i.ibb.co/ccK5RByF/MG-20260310-WA0047.jpg"},
            {en:"group", tr:"grup", img:"https://i.ibb.co/v4MgBRDW/MG-20260310-WA0049.jpg"},
            {en:"hand", tr:"el", img:"https://i.ibb.co/tTypLDS8/MG-20260310-WA0052.jpg"},
            {en:"part", tr:"parça", img:"https://i.ibb.co/VpHDnBXM/MG-20260310-WA0053.jpg"},
            {en:"week", tr:"hafta", img:"https://i.ibb.co/bjnqJxsm/MG-20260310-WA0016.jpg"},
            {en:"system", tr:"sistem", img:"https://i.ibb.co/PZnpcBbR/MG-20260310-WA0018.jpg"},
            {en:"word", tr:"kelime", img:"https://i.ibb.co/XZv8fN24/MG-20260310-WA0019.jpg"},
            {en:"work", tr:"iş/çalışmak", img:"https://i.ibb.co/RpDT6rGL/MG-20260310-WA0020.jpg"},
            {en:"make", tr:"yapmak", img:"https://i.ibb.co/m5zRnpt2/MG-20260310-WA0022.jpg"},
            {en:"take", tr:"almak", img:"https://i.ibb.co/jZr6m9M1/MG-20260310-WA0023.jpg"},
            {en:"give", tr:"vermek", img:"https://i.ibb.co/cSPcP1Yh/MG-20260310-WA0024.jpg"},
            {en:"come", tr:"gelmek", img:"https://i.ibb.co/Zpx13vyb/MG-20260310-WA0025.jpg"},
            {en:"look", tr:"bakmak", img:"https://i.ibb.co/k68RdYVh/MG-20260310-WA0026.jpg"},
            {en:"want", tr:"istemek", img:"https://i.ibb.co/3yvVh1WR/MG-20260310-WA0027.jpg"},
            {en:"find", tr:"bulmak", img:"https://i.ibb.co/6RY23yxs/MG-20260310-WA0028.jpg"},
            {en:"tell", tr:"anlatmak", img:"https://i.ibb.co/Lz4CFQhG/MG-20260310-WA0029.jpg"},
            {en:"ask", tr:"sormak", img:"https://i.ibb.co/bgFFWDsk/MG-20260310-WA0030.jpg"},
            {en:"feel", tr:"hissetmek", img:"https://i.ibb.co/MkHSKKcC/MG-20260310-WA0033.jpg"},
            {en:"call", tr:"aramak", img:"https://i.ibb.co/FkZWCBGw/MG-20260310-WA0013.jpg"},
            {en:"help", tr:"yardım", img:"https://i.ibb.co/cKwMXMq0/MG-20260310-WA0002.jpg"},
            {en:"talk", tr:"konuşmak", img:"https://i.ibb.co/275yVhc2/MG-20260310-WA0003.jpg"},
            {en:"good", tr:"iyi", img:"https://i.ibb.co/TDsqp30R/MG-20260310-WA0005.jpg"},
            {en:"first", tr:"birinci", img:"https://i.ibb.co/jZqJbFxd/MG-20260310-WA0006.jpg"},
            {en:"last", tr:"son", img:"https://i.ibb.co/mCN7sY6P/MG-20260310-WA0007.jpg"},
            {en:"little", tr:"küçük", img:"https://i.ibb.co/3m1WbQh8/MG-20260310-WA0010.jpg"},
            {en:"old", tr:"eski", img:"https://i.ibb.co/0Rk8xvZR/MG-20260310-WA0011.jpg"}
        ];

        const listDiv = document.getElementById('list');
        
        wordData.forEach((item, index) => {
            let div = document.createElement('div');
            div.className = 'word-item';
            div.innerHTML = `<span><button class="speaker-btn" onclick="event.stopPropagation(); speak('${item.en}')">🔊</button>${index + 1}. ${item.en}</span>`;
            div.onclick = () => openPage(item);
            listDiv.appendChild(div);
        });

        function openPage(item) {
            currentWord = item.en;
            document.getElementById('selectedWordTitle').innerText = item.en;
            document.getElementById('page-overlay').classList.add('active');
            speak(item.en);

            const imgUrl = item.img ? item.img : `https://source.unsplash.com/400x300/?${item.en}`;
            document.getElementById('imageBox').innerHTML = `<img src="${imgUrl}" style="width:100%; height:100%; object-fit:contain;">`;
            document.getElementById('filmBox').innerHTML = `<p style="color:#aaa; font-size:12px;">Hoca film atcak</p>`;
        }

        function closePage() {
            document.getElementById('page-overlay').classList.remove('active');
            window.speechSynthesis.cancel();
        }
    </script>
</body>
</html>
