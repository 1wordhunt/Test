<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelime Projesi v3.7 - Full List</title>
    <style>
        :root {
            --spot-black: #121212;
            --spot-grey: #181818;
            --inner-grey: #282828;
        }

        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        
        .list-container { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
        .word-item { 
            background: white; padding: 18px; border-radius: 15px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.3s;
        }
        .listen-icon { font-size: 20px; color: #1DB954; padding: 5px; cursor: pointer; }

        #page-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--spot-black); z-index: 1000; justify-content: center; align-items: center;
            flex-direction: column;
        }

        .content-container { width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; position: relative; }

        .word-header { color: white; text-align: center; margin-bottom: 10px; }
        .word-header h1 { margin: 0; font-size: 32px; font-weight: 800; display: inline-block; vertical-align: middle; }
        .word-header span { font-size: 18px; opacity: 0.6; margin-left: 10px; }
        .header-listen { background: none; border: none; color: white; font-size: 24px; cursor: pointer; margin-left: 10px; vertical-align: middle; }

        .media-row { display: flex; gap: 10px; width: 100%; }
        .media-box { 
            flex: 1; height: 150px; background: white; border-radius: 20px; 
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .media-box img { width: 100%; height: 100%; object-fit: cover; }

        .spotify-card { 
            background: var(--spot-grey); border-radius: 35px; padding: 30px; 
            color: white; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .empty-player-box { 
            height: 180px; background: var(--inner-grey); border-radius: 20px; margin-bottom: 25px;
        }

        .progress-area { width: 100%; position: relative; margin: 20px 0; }
        .bar-bg { width: 100%; height: 4px; background: #4f4f4f; border-radius: 2px; }
        .bar-fill { width: 40%; height: 4px; background: white; border-radius: 2px; }
        .dot { width: 12px; height: 12px; background: white; border-radius: 50%; position: absolute; left: 40%; top: -4px; }
        .plus-icon { position: absolute; right: 0; top: -35px; font-size: 24px; color: white; }

        .btns { display: flex; justify-content: space-between; align-items: center; }
        .btn-small { background: none; border: none; font-size: 22px; color: #b3b3b3; cursor: pointer; }
        .play-main { background: white; color: black; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; border: none; cursor: pointer; }

        .close-x { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; color: #b3b3b3; z-index: 1001; }
    </style>
</head>
<body>

    <h1 style="text-align:center">İngilizce Kelime Listesi</h1>
    <div class="list-container" id="list"></div>

    <div id="page-overlay">
        <div class="close-x" onclick="closePage()">✕</div>
        <div class="content-container">
            
            <div class="word-header">
                <h1 id="topWord">WORD</h1>
                <span id="topTr">(Türkçe)</span>
                <button class="header-listen" onclick="speakAgain()">🔊</button>
            </div>

            <div class="media-row">
                <div class="media-box" id="resimKutusu"></div>
                <div class="media-box" id="filmKutusu"></div>
            </div>

            <div class="spotify-card">
                <div class="empty-player-box"></div>

                <div class="progress-area">
                    <div class="plus-icon">⊕</div>
                    <div class="bar-bg"><div class="bar-fill"></div></div>
                    <div class="dot"></div>
                </div>

                <div class="btns">
                    <button class="btn-small">🔀</button>
                    <button class="btn-small">⏮</button>
                    <button class="play-main" onclick="speakAgain()">▶</button>
                    <button class="btn-small">⏭</button>
                    <button class="btn-small">🔁</button>

        const listDiv = document.getElementById('list');
        wordData.forEach((item, index) => {
            let div = document.createElement('div');
            div.className = 'word-item';
            div.innerHTML = `
                <span onclick="openPage(${JSON.stringify(item).replace(/"/g, '&quot;')})"><b>${index + 1}.</b> ${item.en}</span> 
                <span class="listen-icon" onclick="event.stopPropagation(); speak('${item.en}')">🔊</span>`;
            listDiv.appendChild(div);
        });

        function openPage(item) {
            currentWord = item.en;
            document.getElementById('topWord').innerText = item.en.toUpperCase();
            document.getElementById('topTr').innerText = `(${item.tr})`;
            document.getElementById('resimKutusu').innerHTML = `<img src="${item.img}">`;
            document.getElementById('filmKutusu').innerHTML = `<p style="font-size:12px;color:#999;text-align:center">Hoca film atcak</p>`;
            document.getElementById('page-overlay').style.display = 'flex';
            speak(item.en);
        }

        function closePage() {
            document.getElementById('page-overlay').style.display = 'none';
            window.speechSynthesis.cancel();
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
        }

        function speakAgain() { if(currentWord) speak(currentWord); }
