<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Süper Futbol</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #2e7d32; touch-action: none; }
        canvas { display: block; }
        #sutBtn { 
            position: absolute; bottom: 50px; right: 30px; 
            width: 100px; height: 100px; border-radius: 50%; 
            background: red; color: white; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            border: 5px solid white; font-size: 20px; z-index: 100;
        }
    </style>
</head>
<body>
    <div id="sutBtn">ŞUT</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const sutBtn = document.getElementById('sutBtn');

        // Ekran boyutunu ayarla
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Karakterler (Görünmesi için ekranın tam ortasına koydum)
        let oyuncu = { x: canvas.width / 2, y: canvas.height / 2 + 100, r: 35, renk: 'blue' };
        let top = { x: canvas.width / 2, y: canvas.height / 2, r: 15, vx: 0, vy: 0, bende: false };

        // Mobil Kontrol
        window.addEventListener('touchmove', (e) => {
            oyuncu.x = e.touches[0].clientX;
            oyuncu.y = e.touches[0].clientY;
        });

        // Şut Butonu
        sutBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (top.bende) {
                top.bende = false;
                top.vy = -35; // Yukarı fırlat
            }
        });

        function guncelle() {
            // Mesafe kontrolü
            let dx = top.x - oyuncu.x;
            let dy = top.y - oyuncu.y;
            let mesafe = Math.sqrt(dx*dx + dy*dy);

            if (mesafe < oyuncu.r + top.r) {
                top.bende = true;
            }

            if (top.bende) {
                top.x = oyuncu.x;
                top.y = oyuncu.y - 45; // Topu oyuncunun önünde tut
                top.vx = 0; top.vy = 0;
            } else {
                top.x += top.vx;
                top.y += top.vy;
                top.vx *= 0.97; top.vy *= 0.97; // Yavaşlama
            }

            // Ekran dışına çıkmasınlar
            if(top.y < 0) top.vy *= -1;
            if(top.x < 0 || top.x > canvas.width) top.vx *= -1;
        }

        function ciz() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Sahayı çiz (Yeşil zemin üzerine çizgiler)
            ctx.strokeStyle = "white";
            ctx.lineWidth = 3;
            ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);

            // Oyuncuyu çiz (Mavi Daire)
            ctx.beginPath();
            ctx.arc(oyuncu.x, oyuncu.y, oyuncu.r, 0, Math.PI*2);
            ctx.fillStyle = oyuncu.renk;
            ctx.fill();
            ctx.stroke();

            // Topu çiz (Beyaz Daire)
            ctx.beginPath();
            ctx.arc(top.x, top.y, top.r, 0, Math.PI*2);
            ctx.fillStyle = "white";
            ctx.fill();
            ctx.strokeStyle = "black";
            ctx.stroke();

            guncelle();
            requestAnimationFrame(ciz);
        }

        ciz();
    </script>
</body>
</html>
