<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelime Projesi v3.0</title>
    <style>
        :root {
            --spotify-green: #1db954;
            --spotify-black: #191414;
            --bg-color: #f9f9f9;
            --main-text: #333;
            --sub-text: #7f8c8d;
        }

        body { font-family: Arial, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: var(--main-text); }
        h1 { text-align: center; color: var(--main-text); margin-bottom: 30px; }

        /* Kelime Listesi Tasarımı */
        .list-container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }
        .word-item { 
            background: white; padding: 18px; border: 1px solid #ddd; border-radius: 8px;
            cursor: pointer; font-size: 18px; display: flex; justify-content: space-between; align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }
        .word-item:hover { background: #e0f7fa; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .word-item::after { content: "›"; font-size: 26px; color: #bbb; margin-left: 10px; }

        .speaker-btn {
            background: #3498db; color: white; border: none; border-radius: 50%;
            width: 32px; height: 32px; margin-right: 15px; cursor: pointer;
            font-size: 15px; line-height: 32px; text-align: center; display: inline-block;
            transition: background 0.2s;
        }
        .speaker-btn:hover { background: #2980b9; }
        .tr-word { color: var(--sub-text); font-size: 14px; margin-left: 10px; font-style: italic; }

        /* Animasyonlu Tam Ekran Sayfa */
        #page-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); z-index: 1000; overflow-y: auto;
            backdrop-filter: blur(5px);
            justify-content: center; align-items: center;
        }

        .page-content { 
            background: white; width: 90%; max-width: 450px; border-radius: 25px; 
            padding: 30px; text-align: center;
            position: relative;
            transform: scale(0.1); opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        #page-overlay.active { display: flex; }
        #page-overlay.active .page-content { transform: scale(1); opacity: 1; }

        /* Yeni İçerik Tasarımı (Resim Sol, Film Sağ) */
        .content-split {
            display: flex; gap: 20px; justify-content: center; align-items: stretch; margin: 20px 0;
            width: 100%;
        }

        /* Resim Alanı (Sol) */
        .image-placeholder { 
            flex: 1; min-height: 250px; background: #eee; 
            border-radius: 15px; display: flex; 
            align-items: center; justify-content: center; overflow: hidden; 
            border: 1px solid #ddd;
        }

        /* Film Kesiti Alanı (Sağ) */
        .film-kesiti-placeholder {
            flex: 1; min-height: 250px; background: #eee; 
            border-radius: 15px; display: flex; 
            align-items: center; justify-content: center; overflow: hidden; 
            border: 1px solid #ddd;
        }

        #selectedWordTitle { font-size: 36px; margin: 15px 0 25px 0; text-transform: capitalize; font-weight: bold; color: var(--spotify-black); }
        .back-btn { 
            background: #eee; color: var(--main-text); border: none; 
            padding: 10px 20px; border-radius: 20px; cursor: pointer; 
            position: absolute; top: 20px; left: 20px; font-weight: bold;
            transition: background 0.2s;
        }
        .back-btn:hover { background: #ddd; }

        /* Spotify Tarzı Müzik Çalar Tasarımı */
        .music-player {
            background: #f4f4f4; border-radius: 20px; padding: 20px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
            margin-top: 30px; width: 100%;
            display: flex; flex-direction: column; align-items: center;
        }

        .progress-container { width: 90%; height: 6px; background: #ccc; border-radius: 3px; margin: 15px 0 25px 0; position: relative; cursor: pointer; }
        .progress-bar { width: 40%; height: 100%; background: var(--spotify-green); border-radius: 3px; position: absolute; }
        .progress-dot { width: 14px; height: 14px; background: var(--spotify-green); border-radius: 50%; position: absolute; top: -4px; left: 40%; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .player-controls { display: flex; align-items: center; gap: 30px; }
        .player-controls button { background: none; border: none; color: #666; font-size: 24px; cursor: pointer; transition: color 0.2s; }
        .player-controls button:hover { color: var(--spotify-green); }
        .player-controls .play-main-btn { color: white; background: var(--spotify-black); width: 60px; height: 60px; border-radius: 50%; font-size: 24px; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
        .player-controls .play-main-btn:hover { transform: scale(1.05); color: var(--spotify-green); }
        .player-controls .play-main-btn span { position: relative; left: 2px; }

        .player-controls .small-icon { font-size: 18px; color: #aaa; }
    </style>
</head>

                </div>
                <div class="film-kesiti-placeholder" id="filmBox">
                    <p style="color:var(--sub-text);">Hoca film kesiti atcak...</p>
                </div>
            </div>

            <div class="music-player">
                <div class="progress-container">
                    <div class="progress-bar"></div>
                    <div class="progress-dot"></div>
                </div>

                <div class="player-controls">

        const listDiv = document.getElementById('list');
        
        words.forEach((w, index) => {
            let div = document.createElement('div');
            div.className = 'word-item';
            div.innerHTML = `<span><button class="speaker-btn" onclick="event.stopPropagation(); speak('${w}')">🔊</button>${index + 1}. ${w}</span>`;
            // Tıklandığında direkt obje gönderiliyor
            div.onclick = () => openPage(wordData[index]);
            listDiv.appendChild(div);
        });

        // Sayfa Açma Fonksiyonu (Animasyonlu)
        function openPage(item) {
            document.getElementById('selectedWordTitle').innerText = item.en;
            
            const overlay = document.getElementById('page-overlay');
            overlay.classList.add('active'); // CSS animasyonunu tetikle

            // Önceki konuşmayı durdur, yeni kelimeyi oku
            speak(item.en);

            // Resim Alanı
            const imageBox = document.getElementById('imageBox');
            if(item.img && item.img !== "") {
                imageBox.innerHTML = `<img src="${item.img}" style="width:100%; height:100%; object-fit:contain;" alt="${item.en}">`;
            } else {
                imageBox.innerHTML = `<img src="https://source.unsplash.com/400x300/?${item.en}" style="width:100%; height:100%; object-fit:cover;" alt="${item.en}">`;
            }

            // Film Kesiti Alanı (İçi boş, hoca için)
            document.getElementById('filmBox').innerHTML = `<p style="color:var(--sub-text);">Hoca buraya film kesiti (<video>) atacak.</p>`;
        }

        // Sayfa Kapatma Fonksiyonu (Animasyonlu)
        function closePage() {
            const overlay = document.getElementById('page-overlay');
            overlay.classList.remove('active'); // Animasyonla küçült
            window.speechSynthesis.cancel(); // Sayfa kapanınca sesi de durdur
