<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelime Projesi v3.5</title>
    <style>
        :root {
            --spot-black: #121212;
            --spot-grey: #282828;
            --spot-green: #1DB954;
        }

        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        
        .list-container { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
        .word-item { 
            background: white; padding: 18px; border-radius: 15px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.3s;
        }

        #page-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;
            backdrop-filter: blur(10px);
        }

        .content-container { width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }

        /* Üst: Resim ve Film Yan Yana */
        .media-row { display: flex; gap: 10px; width: 100%; }
        .media-box { 
            flex: 1; height: 150px; background: white; border-radius: 20px; 
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .media-box img { width: 100%; height: 100%; object-fit: cover; }

        /* Alt: Spotify Dark Player */
        .spotify-card { 
            background: var(--spot-black); border-radius: 35px; padding: 30px; 
            position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            color: white;
        }

        /* Kelime İsmi Alanı (Resim kaldırıldı) */
        .word-display-area { 
            height: 180px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; border-radius: 20px; background: var(--spot-grey);
            margin-bottom: 25px; text-align: center;
        }
        #playerWordTitle { font-size: 40px; font-weight: 900; margin: 0; letter-spacing: -1px; }
        #playerWordTurkish { font-size: 20px; opacity: 0.6; margin-top: 5px; }

        .progress-area { width: 100%; position: relative; margin: 20px 0; }
        .bar-bg { width: 100%; height: 4px; background: #4f4f4f; border-radius: 2px; }
        .bar-fill { width: 45%; height: 4px; background: white; border-radius: 2px; }
        .dot { width: 12px; height: 12px; background: white; border-radius: 50%; position: absolute; left: 45%; top: -4px; }
        .plus-icon { position: absolute; right: 0; top: -35px; font-size: 24px; cursor: pointer; color: white; }

        .btns { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .btn-small { background: none; border: none; font-size: 22px; cursor: pointer; color: #b3b3b3; }
        .play-main { background: white; color: black; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; border: none; cursor: pointer; }

        .close-x { position: absolute; top: 15px; right: 20px; font-size: 22px; cursor: pointer; color: #b3b3b3; }
    </style>
</head>
<body>

    <h1 style="text-align:center">İngilizce Kelime Listesi</h1>
    <div class="list-container" id="list"></div>

    <div id="page-overlay">
        <div class="content-container">
            
            <div class="media-row">
                <div class="media-box" id="resimKutusu">Resim</div>
                <div class="media-box" id="filmKutusu">Film</div>
            </div>

            <div class="spotify-card">
                <div class="close-x" onclick="closePage()">✕</div>
                
                <div class="word-display-area">
                    <h1 id="playerWordTitle">WORD</h1>
                    <div id="playerWordTurkish">Türkçe Karşılığı</div>
                </div>

                <div class="progress-area">
                    <div class="plus-icon">⊕</div>
                    <div class="bar-bg"><div class="bar-fill"></div></div>
                    <div class="dot"></div>
                </div>

                <div class="btns">
                    <button class="btn-small">🔀</button>
                    <button class="btn-small">⏮</button>
                    <button class="play-main" onclick="speakAgain()">▶</button>
                    <button class="btn-small">⏭</button>
                    <button class="btn-small">🔁</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        let currentWord = "";
        const wordData = [
            {en:"time", tr:"zaman", img:"https://i.ibb.co/FbnR47rF/MG-20260310-WA0034.jpg"},
            {en:"year", tr:"yıl", img:"https://i.ibb.co/Pz3tWTSw/MG-20260310-WA0035.jpg"},
            {en:"people", tr:"insanlar", img:"https://i.ibb.co/8g9cT4GM/MG-20260310-WA0036.jpg"},
            {en:"way", tr:"yol", img:"https://i.ibb.co/chCL2m8m/MG-20260310-WA0037.jpg"},
            {en:"different", tr:"farklı", img:"https://i.ibb.co/6RY23yxs/MG-20260310-WA0028.jpg"}
        ];

        const listDiv = document.getElementById('list');
        wordData.forEach((item, index) => {
            let div = document.createElement('div');
            div.className = 'word-item';
            div.innerHTML = `<span><b>${index + 1}.</b> ${item.en}</span> <span>🔊</span>`;
            div.onclick = () => openPage(item);
            listDiv.appendChild(div);
        });

        function openPage(item) {
            currentWord = item.en;
            document.getElementById('playerWordTitle').innerText = item.en.toUpperCase();
            document.getElementById('playerWordTurkish').innerText = item.tr;
            
            document.getElementById('resimKutusu').innerHTML = `<img src="${item.img}">`;
            document.getElementById('filmKutusu').innerHTML = `<p style="font-size:12px;color:#999">Hoca film atcak</p>`;
            
            document.getElementById('page-overlay').style.display = 'flex';
            speak(item.en);
        }

        function closePage() {
            document.getElementById('page-overlay').style.display = 'none';
            window.speechSynthesis.cancel();
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
        }

        function speakAgain() { if(currentWord) speak(currentWord); }
    </script>
</body>
</html>
