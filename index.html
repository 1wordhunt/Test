<!DOCTYPE html>
<html>
<head>
    <title>Granny: The Escape</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; color: white; top: 10px; left: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">Ekrana basılı tutarak ilerle! Granny geliyor...</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // EV YERİNE DEV BİR KUTU (Hata vermez!)
        const roomGeo = new THREE.BoxGeometry(20, 10, 20);
        const roomMat = new THREE.MeshBasicMaterial({ color: 0x222222, side: THREE.BackSide });
        const room = new THREE.Mesh(roomGeo, roomMat);
        scene.add(room);

        // GRANNY (Korkunç bir blok)
        const gGeo = new THREE.BoxGeometry(1, 2, 1);
        const gMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const granny = new THREE.Mesh(gGeo, gMat);
        granny.position.set(0, -1, -8);
        scene.add(granny);

        camera.position.y = 0;
        let moving = false;
        window.ontouchstart = () => moving = true;
        window.ontouchend = () => moving = false;

        function animate() {
            requestAnimationFrame(animate);
            // Granny takibi
            granny.lookAt(camera.position);
            granny.translateZ(0.04);
            
            // Hareket
            if(moving) camera.translateZ(-0.1);

            // Yakalanma
            if(granny.position.distanceTo(camera.position) < 1.5) {
                alert("YAKALANDIN!");
                location.reload();
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
